<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ملاكي فاطمة</title>
    <style>
        :root {
            --primary-color: #d4af37; /* لون ذهبي كلاسيكي */
            --text-color: #f5f5f7;
            --overlay-bg: rgba(18, 18, 18, 0.85); /* طبقة داكنة لتوضيح النص */
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif, 'Cairo';
            background-image: url('YOUR_IMAGE_URL_HERE'); /* ضع رابط صورتك هنا */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* طبقة حماية لضمان وضوح الصورة والنصوص معاً */
        .background-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), var(--overlay-bg));
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 40px 20px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: var(--text-color);
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .content-text {
            color: #e0e0e0;
            font-size: 1.35rem;
            line-height: 1.8;
            margin-bottom: 40px;
            min-height: 120px;
            white-space: pre-line; /* للحفاظ على نزول الأسطر */
        }

        /* الأزرار والمستطيلات */
        .btn {
            background-color: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 12px 35px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: var(--primary-color);
            color: #121212;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* أنيميشن النبض للعبارة الأخيرة */
        .pulse-text {
            font-size: 2.2rem;
            color: #ff4757;
            font-weight: bold;
            animation: pulse 1.5s infinite;
            margin-top: 20px;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 5px rgba(255, 71, 87, 0.5); }
            50% { transform: scale(1.08); text-shadow: 0 0 20px rgba(255, 71, 87, 0.8); }
            100% { transform: scale(1); text-shadow: 0 0 5px rgba(255, 71, 87, 0.5); }
        }

        /* تأثير تساقط الدايموند */
        .diamond {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #55cdfc; /* لون الدايموند الأزرق المميز */
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            opacity: 0.7;
            z-index: 2;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* ستيفي وأليكس وحركة القلب */
        .minecraft-love {
            display: none;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            margin-top: 30px;
            position: relative;
            height: 150px;
        }

        .character {
            width: 60px;
            height: 120px;
            background-size: contain;
            background-repeat: no-repeat;
            position: relative;
        }

        /* استخدام أشكال كرتونية تقريبية لستيف وأليكس بأسلوب بكسل */
        .steve {
            background-image: url('https://minecraft.wiki/images/Steve_JE2.png'); 
            animation: steveMove 2s forwards;
        }

        .alex {
            background-image: url('https://minecraft.wiki/images/Alex_JE2.png');
            animation: alexMove 2s forwards;
        }

        @keyframes steveMove {
            0% { transform: translateX(-50px); }
            100% { transform: translateX(0); }
        }

        @keyframes alexMove {
            0% { transform: translateX(50px); }
            100% { transform: translateX(0); }
        }

        /* القلب البرمجي الذي يظهر بينهما */
        .pixel-heart {
            width: 30px;
            height: 30px;
            background-color: #ff4757;
            position: absolute;
            top: 20px;
            left: calc(50% - 15px);
            clip-path: polygon(50% 30%, 65% 10%, 85% 10%, 100% 30%, 100% 55%, 50% 100%, 0% 55%, 0% 30%, 15% 10%, 35% 10%);
            animation: heartBeat 1.5s infinite alternate;
        }

        @keyframes heartBeat {
            0% { transform: scale(0.8); }
            100% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <!-- حاوية تساقط الدايموند -->
    <div id="diamond-container"></div>

    <div class="container">
        <h1 id="main-title">شلونج ملاكي</h1>
        <div class="content-text" id="text-box"></div>
        <button class="btn" id="action-btn" onclick="nextStep()">زينه</button>

        <!-- منطقة ستيف وأليكس -->
        <div class="minecraft-love" id="mc-area">
            <div class="character steve"></div>
            <div class="pixel-heart"></div>
            <div class="character alex"></div>
        </div>
    </div>

    <script>
        let currentStep = 0;
        const textBox = document.getElementById('text-box');
        const actionBtn = document.getElementById('action-btn');
        const mainTitle = document.getElementById('main-title');
        const mcArea = document.getElementById('mc-area');

        // النصوص المخطط لها مرتبة حسب الضغطات
        const texts = [
            `أهلاً ملاكي \n نورتي هالمكان بوجودج والله كأن الصفحة صارت أحلى بس لأنج فتحتيها وجودج هنا مو صدفة هذا شي أنا كنت مخططله من زمان`,
            `ما أعرف شلون أوصفها بالضبط\nبس أنتي مو شخص عادي بالنسبة إلي\nبيج شي مختلف يخلي الواحد يرتاح\nوأحبج بطريقة هادئة بدون ضجيج فقط حقيقية`,
            `يمكن ما تحسين بهالشي\nبس صدقيني أنتي دايم ببالي\nاسمج يمر على فكري بدون سبب\nوصرت أفكر بيج أكثر مما أتوقع`,
            `وجودج بحد ذاته شي حلو\nوأتمنى أكون جزء بسيط من يومج\nمثل ما صرتي شي كبير بتفكيري`,
            `الكون عيناكي لا شمس ولا قمر\nوالروض خداك لاغصن ولا ثمر\nوانت في دوحه الاحلام أغنيه\nيشدو بها الحب ولا ناي ولا وتر`
        ];

        function nextStep() {
            if (currentStep < texts.length) {
                // تغيير العنوان الرئيسي ليختفي بعد أول ضغطة لتركيز الانتباه على النصوص
                if (currentStep === 0) {
                    mainTitle.style.display = 'none';
                }
                
                textBox.innerText = texts[currentStep];
                actionBtn.innerText = "التالي";
                currentStep++;
            } else if (currentStep === texts.length) {
                // الخطوة الأخيرة: "احبك يا اغلى ما املك" مع التأثيرات
                textBox.innerHTML = `<div class="pulse-text">أحبك يا أغلى ما أملك</div>`;
                actionBtn.style.display = 'none'; // إخفاء الزر
                mcArea.style.display = 'flex';   // إظهار ستيف وأليكس وحركة القلب
                startDiamonds();                  // بدء تساقط الدايموند في الخلفية
            }
        }

        // دالة إنشاء وتساقط الدايموند
        function startDiamonds() {
            const container = document.getElementById('diamond-container');
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const diamond = document.createElement('div');
                    diamond.classList.add('diamond');
                    diamond.style.left = Math.random() * 100 + 'vw';
                    diamond.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    diamond.style.transform = `scale(${Math.random() * 0.6 + 0.5})`;
                    container.appendChild(diamond);

                    // إزالة العنصر بعد انتهاء الأنيميشن لإراحة المتصفح
                    diamond.addEventListener('animationend', () => {
                        diamond.remove();
                    });
                }, i * 300);
            }
            // استمرار توليد الدايموند
            setInterval(() => {
                const diamond = document.createElement('div');
                diamond.classList.add('diamond');
                diamond.style.left = Math.random() * 100 + 'vw';
                diamond.style.animationDuration = (Math.random() * 3 + 2) + 's';
                container.appendChild(diamond);
                setTimeout(() => { diamond.remove(); }, 5000);
            }, 400);
        }
    </script>
</body>
</html>
